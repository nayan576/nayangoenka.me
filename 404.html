<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>Not found | Nayan Goenka</title>
<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="stylesheet" href="/styles.css">
<style>
  body{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:24px;gap:18px}

  a.home:hover{opacity:.55}
</style>
</head>
<body>
  <span class="code">404</span>
  <h1>This page took a different walk.</h1>
